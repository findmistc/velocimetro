<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Velocímetro Digital</title>

<style>

body{
    background:#f0f0f0;
    font-family:Arial;
    text-align:center;
    margin-top:100px;
}

.painel{
    background:white;
    width:350px;
    margin:auto;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.valor{
    font-size:40px;
    margin:20px;
}

</style>

</head>

<body>

<div class="painel">

<h1>Telemetria</h1>

<div class="valor">
<span id="velocidade">0</span> km/h
</div>

<div class="valor">
<span id="rpm">0</span> RPM
</div>

</div>

<script>

function atualizarDados(){

    fetch("buscar_ultimo.php")

    .then(response => response.json())

    .then(data => {

        document.getElementById("velocidade").innerText =
        data.velocidade;

        document.getElementById("rpm").innerText =
        data.rpm;

    })

    .catch(error => console.log(error));
}

atualizarDados();

setInterval(atualizarDados,1000);

</script>

</body>
</html>
